<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Germán Velásquez</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--orange:#FF6B2C;--orange-dark:#E85520;--orange-glow:rgba(255,107,44,0.15);--orange-glow2:rgba(255,107,44,0.08);--black:#0A0A0A;--dark:#1A1A1A;--gray-700:#555;--gray-500:#888;--gray-300:#CCC;--gray-100:#F2F2F2;--white:#FFF;--font:'Montserrat',sans-serif;--radius:12px;--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);color:var(--dark);background:var(--white);line-height:1.8;-webkit-font-smoothing:antialiased}
    nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);box-shadow:0 1px 20px rgba(0,0,0,0.06)}
    .nav-inner{max-width:1200px;margin:0 auto;padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-size:18px;font-weight:700;color:var(--black);text-decoration:none}
    .nav-links{display:flex;gap:24px;align-items:center}
    .nav-links a{font-size:13px;font-weight:500;color:var(--gray-700);text-decoration:none;letter-spacing:0.5px;text-transform:uppercase;transition:var(--transition)}
    .nav-links a:hover{color:var(--orange)}
    .container{max-width:800px;margin:0 auto;padding:100px 24px 60px}
    article h1{font-size:36px;font-weight:800;letter-spacing:-1.5px;line-height:1.15;margin-bottom:12px}
    .meta{font-size:13px;color:var(--gray-500);margin-bottom:32px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
    .tag{font-size:11px;font-weight:600;color:var(--orange);background:var(--orange-glow2);padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:0.5px}
    .cat{font-size:11px;font-weight:600;color:var(--white);background:var(--orange);padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:0.5px}
    article h2{font-size:24px;font-weight:700;margin:32px 0 12px;letter-spacing:-0.5px}
    article h3{font-size:20px;font-weight:600;margin:24px 0 8px}
    article p{margin-bottom:16px;font-size:16px;color:#333}
    article ul,article ol{margin:0 0 16px 24px;font-size:16px;color:#333}
    article li{margin-bottom:8px}
    article strong{font-weight:700;color:var(--black)}
    article blockquote{border-left:3px solid var(--orange);padding:8px 20px;margin:0 0 16px;background:var(--orange-glow2);border-radius:0 var(--radius) var(--radius) 0;font-style:italic}
    .share-bar{margin-top:40px;padding-top:24px;border-top:1px solid var(--gray-100);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .share-bar span{font-size:13px;font-weight:600;color:var(--gray-700);text-transform:uppercase;letter-spacing:1px}
    .share-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:8px 16px;border-radius:100px;border:1px solid var(--gray-100);background:var(--white);color:var(--gray-700);cursor:pointer;text-decoration:none;transition:var(--transition)}
    .share-btn:hover{border-color:var(--orange);color:var(--orange)}
    .back-link{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--gray-700);text-decoration:none;margin-bottom:40px;transition:var(--transition)}
    .back-link:hover{color:var(--orange)}
    @media(max-width:768px){.container{padding:80px 16px 40px}article h1{font-size:28px}.nav-links{display:none}}
  </style>
</head>
<body>
  <nav><div class="nav-inner">
    <a href="/" class="nav-logo" id="nav-logo-post"></a>
    <div class="nav-links" id="nav-links-post"></div>
  </div></nav>
  <div class="container">
    <a href="/#blog" class="back-link">← Volver al blog</a>
    <article id="article"></article>
    <div class="share-bar">
      <span>Compartir</span>
      <a class="share-btn" id="share-li" target="_blank">LinkedIn</a>
      <a class="share-btn" id="share-tw" target="_blank">Twitter</a>
      <a class="share-btn" id="share-wa" target="_blank">WhatsApp</a>
      <button class="share-btn" id="share-copy">Copiar link</button>
    </div>
  </div>
  <script>
    // Simple markdown to HTML renderer
    function md(text){
      return text
        .replace(/^### (.+)$/gm,'<h3>$1</h3>')
        .replace(/^## (.+)$/gm,'<h2>$1</h2>')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
        .replace(/^- (.+)$/gm,'<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
        .replace(/\n\n/g,'</p><p>')
        .replace(/^\s*/,'')
    }
    const params=new URLSearchParams(location.search);
    const slug=params.get('id')||location.pathname.match(/blog\/(.+)\.html/)?.[1];
    if(slug){
      // Build nav
      fetch('content.json').then(r=>r.json()).then(nc=>{
        document.getElementById('nav-logo-post').textContent=nc.site.logo;
        const navEl=document.getElementById('nav-links-post');
        const navCta=['conversemos'];
        (nc.nav&&nc.nav.items||[]).forEach(item=>{
          const label=item.label||item;
          const href=item.url||'#';
          const resolvedHref=href.startsWith('#')?'/'+href:href.startsWith('http')||href.startsWith('mailto:')?href:'/'+href;
          const isCta=navCta.includes(label.toLowerCase());
          navEl.innerHTML+=isCta?`<a href="${resolvedHref}" style="color:var(--white);background:var(--orange);padding:8px 16px;border-radius:100px">${label}</a>`:`<a href="${resolvedHref}">${label}</a>`;
        });
      }).catch(()=>{});

      fetch('blog/content.json').then(r=>r.json()).then(bc=>{
        const post=(bc.posts||[]).find(p=>p.id===slug);
        if(!post){document.getElementById('article').innerHTML='<h1>Artículo no encontrado</h1><p><a href="/">Volver al inicio</a></p>';return}
        document.title=post.title+' — Germán Velásquez';
        // SEO
        const m=d=>{const e=document.createElement('meta');Object.entries(d).forEach(([k,v])=>e.setAttribute(k,v));document.head.appendChild(e)};
        m({name:'description',content:post.excerpt});
        m({property:'og:title',content:post.title});
        m({property:'og:description',content:post.excerpt});
        m({property:'og:type',content:'article'});
        m({name:'twitter:card',content:'summary'});
        m({name:'twitter:title',content:post.title});
        m({name:'article:published_time',content:post.date});
        m({name:'article:section',content:post.category});
        post.tags.forEach(t=>m({name:'article:tag',content:t}));
        const a=document.getElementById('article');
        a.innerHTML=`<h1>${post.title}</h1><div class="meta"><span class="cat">${post.category}</span>${post.tags.map(t=>`<span class="tag">${t}</span>`).join('')}<span>${post.date}</span><span>${post.read_time}</span></div><p>${post.body?md(post.body):post.excerpt}</p>`;
        // Share
        const url=encodeURIComponent(location.href),title=encodeURIComponent(post.title),excerpt=encodeURIComponent(post.excerpt);
        document.getElementById('share-li').href=`https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
        document.getElementById('share-tw').href=`https://twitter.com/intent/tweet?text=${title}&url=${url}`;
        document.getElementById('share-wa').href=`https://wa.me/?text=${title}%20${url}`;
        document.getElementById('share-copy').onclick=()=>{navigator.clipboard.writeText(location.href);document.getElementById('share-copy').textContent='✓ Copiado';setTimeout(()=>document.getElementById('share-copy').textContent='Copiar link',2000)};
      });
    }
  </script>
</body>
</html>
