<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Germán Velásquez</title>
  <meta name="description" content="Escribo sobre lo que vivo: CX, IA, transformación digital, emprendimiento y liderazgo. Lecciones reales de empresas reales.">
  <meta property="og:title" content="Blog — Germán Velásquez">
  <meta property="og:description" content="Escribo sobre lo que vivo: CX, IA, transformación digital, emprendimiento y liderazgo. Lecciones reales de empresas reales.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://germanvelasquez.co/blog.html">
  <meta name="twitter:card" content="summary">
  <link rel="canonical" href="https://germanvelasquez.co/blog.html">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--orange:#FF6B2C;--orange-light:#FF8F5E;--orange-dark:#E85520;--orange-glow:rgba(255,107,44,0.15);--orange-glow2:rgba(255,107,44,0.08);--black:#0A0A0A;--dark:#1A1A1A;--gray-900:#2D2D2D;--gray-700:#555555;--gray-500:#888888;--gray-300:#CCCCCC;--gray-100:#F2F2F2;--white:#FFFFFF;--blue:#2563EB;--blue-light:#3B82F6;--blue-glow:rgba(37,99,235,0.12);--font:'Montserrat',sans-serif;--radius:12px;--radius-lg:20px;--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
    *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
    body{font-family:var(--font);color:var(--dark);background:var(--white);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    nav{position:fixed;top:0;width:100%;z-index:1000;transition:var(--transition)}
    nav.scrolled{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);box-shadow:0 1px 20px rgba(0,0,0,0.06)}
    .nav-inner{max-width:1200px;margin:0 auto;padding:20px 40px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-family:var(--font);font-size:18px;font-weight:700;color:var(--black);text-decoration:none;letter-spacing:-0.3px}
    .nav-links{display:flex;gap:32px;align-items:center}
    .nav-links a{font-size:13px;font-weight:500;color:var(--gray-700);text-decoration:none;letter-spacing:0.5px;text-transform:uppercase;transition:var(--transition)}
    .nav-links a:hover{color:var(--orange)}
    .nav-links a.active{color:var(--orange);font-weight:600}
    .nav-cta{font-size:13px!important;font-weight:600!important;color:var(--white)!important;background:var(--orange);padding:10px 20px;border-radius:100px;text-transform:uppercase!important;letter-spacing:0.5px;transition:var(--transition)}
    .nav-cta:hover{background:var(--orange-dark);transform:scale(1.02)}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;z-index:1001}
    .hamburger span{width:24px;height:2px;background:var(--black);border-radius:2px}
    .mobile-menu{display:none;position:fixed;inset:0;background:var(--white);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:24px}
    .mobile-menu.open{display:flex}.mobile-menu a{font-size:20px;font-weight:600;color:var(--dark);text-decoration:none}.mobile-menu a:hover{color:var(--orange)}
    .mobile-close{position:absolute;top:20px;right:20px;background:none;border:none;font-size:28px;cursor:pointer}

    /* Hero */
    .blog-hero{background:var(--black);padding:140px 40px 80px;text-align:center;position:relative;overflow:hidden}
    .blog-hero-bg{position:absolute;inset:0;z-index:1}
    .blog-hero-bg .gradient1{position:absolute;width:600px;height:600px;background:radial-gradient(circle,var(--orange-glow) 0%,transparent 70%);top:-200px;right:-100px;animation:float 8s ease-in-out infinite}
    .blog-hero-bg .gradient2{position:absolute;width:400px;height:400px;background:radial-gradient(circle,var(--blue-glow) 0%,transparent 70%);bottom:-200px;left:-100px;animation:float 10s ease-in-out infinite reverse}
    @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
    .blog-hero-content{position:relative;z-index:2;max-width:800px;margin:0 auto}
    .blog-hero h1{font-size:56px;font-weight:800;letter-spacing:-2.5px;color:var(--white);margin-bottom:16px}
    .blog-hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--orange),var(--orange-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .blog-hero p{font-size:18px;font-weight:400;color:var(--gray-300);line-height:1.7}

    /* Filters */
    .blog-section{padding:60px 40px 100px}
    .container{max-width:1200px;margin:0 auto}
    .blog-filters{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:32px}
    .blog-search{flex:1;min-width:200px;padding:12px 16px;border:1px solid var(--gray-100);border-radius:100px;font-family:var(--font);font-size:14px;outline:none;transition:var(--transition)}
    .blog-search:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-glow)}
    .filter-group{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .filter-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--gray-500);margin-right:4px}
    .blog-filter-btn{font-size:12px;font-weight:600;padding:8px 16px;border-radius:100px;border:1px solid var(--gray-100);background:var(--white);color:var(--gray-700);cursor:pointer;transition:var(--transition);text-transform:uppercase;letter-spacing:0.5px}
    .blog-filter-btn:hover,.blog-filter-btn.active{border-color:var(--orange);color:var(--orange);background:var(--orange-glow2)}

    /* Cards */
    .blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .blog-card{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--radius);padding:28px;transition:var(--transition);display:flex;flex-direction:column;cursor:pointer;position:relative}
    .blog-card:hover{border-color:var(--orange);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.06)}
    .blog-date{font-size:12px;color:var(--gray-500);margin-bottom:8px;font-weight:500}
    .blog-category{display:inline-block;font-size:10px;font-weight:600;color:var(--white);background:var(--orange);padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;align-self:flex-start}
    .blog-card h3{font-size:18px;font-weight:700;margin-bottom:10px;line-height:1.3}
    .blog-card p{font-size:14px;color:var(--gray-700);line-height:1.6;flex:1}
    .blog-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
    .blog-tag{font-size:10px;font-weight:600;color:var(--orange);background:var(--orange-glow2);padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:0.5px}
    .blog-read{font-size:12px;color:var(--gray-500);margin-top:12px;font-weight:500}
    .blog-share{margin-top:12px;display:flex;gap:8px}
    .blog-share-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--gray-100);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:var(--transition);color:var(--gray-700)}
    .blog-share-btn:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-glow2)}
    .blog-share-btn svg{width:14px;height:14px;fill:currentColor}
    .no-results{text-align:center;padding:60px 20px;color:var(--gray-500);font-size:16px;display:none}

    footer{background:var(--black);border-top:1px solid rgba(255,255,255,0.06);padding:32px 40px}
    .footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--gray-500)}
    .footer-links{display:flex;gap:24px}.footer-links a{color:var(--gray-500);text-decoration:none;transition:var(--transition)}.footer-links a:hover{color:var(--orange)}

    @media(max-width:1024px){.blog-grid{grid-template-columns:repeat(2,1fr)}}
    .filters-row{display:flex;gap:8px;align-items:center;flex:1}
    .filters-toggle{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border:1px solid var(--gray-100);border-radius:100px;background:var(--white);font-family:Montserrat,sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--gray-700);cursor:pointer;transition:var(--transition);white-space:nowrap}
    .filters-toggle:hover,.filters-toggle.active{border-color:var(--orange);color:var(--orange)}
    .filters-toggle svg{transition:transform 0.2s}
    .filters-toggle.active svg{transform:rotate(180deg)}
    .filter-chips{display:flex;gap:6px;flex-wrap:wrap}
    .filter-chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;border:1px solid var(--orange);background:var(--orange-glow2);color:var(--orange);display:inline-flex;align-items:center;gap:4px}
    .filter-chip button{background:none;border:none;color:inherit;cursor:pointer;font-size:12px;line-height:1;padding:0;margin-left:2px}
    .filters-panel{display:none;border:1px solid var(--gray-100);border-radius:var(--radius);padding:20px;margin-bottom:24px;background:var(--white)}
    .filters-panel.open{display:block}
    .filter-section{margin-bottom:16px}
    .filter-section:last-child{margin-bottom:0}
    .filter-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray-500);margin-bottom:8px}
    .filter-options{display:flex;flex-wrap:wrap;gap:6px}
    .filter-opt{font-size:12px;font-weight:500;padding:6px 14px;border-radius:100px;border:1px solid var(--gray-100);background:var(--white);color:var(--gray-700);cursor:pointer;transition:var(--transition)}
    .filter-opt:hover{border-color:var(--orange);color:var(--orange)}
    .filter-opt.active{background:var(--orange);border-color:var(--orange);color:#fff}
    .blog-filters{flex-direction:column;align-items:stretch;gap:12px}
    @media(max-width:768px){.blog-hero h1{font-size:36px;letter-spacing:-1.5px}.blog-hero{padding:120px 20px 60px}.blog-section{padding:40px 20px 60px}.nav-links{display:none}.hamburger{display:flex}.blog-grid{grid-template-columns:1fr}.nav-inner{padding:16px 20px}.footer-inner{flex-direction:column;gap:12px;text-align:center}.filters-row{flex-direction:column;align-items:stretch}}
  </style>
  <link rel="stylesheet" href="css/nav.css">
</head>
<body>
  <nav class="nav-light" id="nav"><div class="nav-inner">
    <a href="/" class="nav-logo" id="nav-logo"></a>
    <div class="nav-links" id="nav-links"></div>
    <button class="hamburger" onclick="toggleMobile()" aria-label="Menu"><span></span><span></span><span></span></button>
  </div></nav>
  <div class="mobile-menu" id="mobileMenu"><button class="mobile-close" onclick="toggleMobile()">x</button><div id="mobile-nav-links"></div></div></div>

  <section class="blog-hero">
    <div class="blog-hero-bg"><div class="gradient1"></div><div class="gradient2"></div></div>
    <div class="blog-hero-content">
      <h1>Blog</h1>
      <p>Escribo sobre lo que vivo</p>
    </div>
  </section>

  <section class="blog-section">
    <div class="container">
      <div class="blog-filters" id="blog-filters">
        <input type="text" class="blog-search" id="blog-search" placeholder="Buscar posts por titulo, contenido o tag...">
        <div class="filters-row">
          <button class="filters-toggle" id="filters-toggle">
            <span>Filtros</span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4l3 3 3-3"/></svg>
          </button>
          <div class="filter-chips" id="filter-chips"></div>
        </div>
      </div>
      <div class="filters-panel" id="filters-panel">
        <div class="filter-section">
          <span class="filter-label">Categorias</span>
          <div class="filter-options" id="category-filters"></div>
        </div>
        <div class="filter-section">
          <span class="filter-label">Tags</span>
          <div class="filter-options" id="tag-filters"></div>
        </div>
      </div>
      <div class="blog-grid" id="blog-grid"></div>
      <div class="no-results" id="no-results">No se encontraron posts que coincidan con tu búsqueda.</div>
    </div>
  </section>

  <footer><div class="footer-inner">
    <span>Germán Velásquez · Cajicá, Colombia</span>
    <div class="footer-links">
      <a href="https://www.linkedin.com/in/germanvelasquezco" target="_blank">LinkedIn</a>
      <a href="https://turnflow.com.co" target="_blank">TurnFlow</a>
      <a href="https://lynkko.co" target="_blank">Lynkko</a>
      <a href="mailto:gvelasquez85@gmail.com">Email</a>
    </div>
  </div></footer>

  <script>
    function toggleMobile(){document.getElementById('mobileMenu').classList.toggle('open')}
    window.addEventListener('scroll',()=>{document.getElementById('nav').classList.toggle('scrolled',window.scrollY>50)});

    let allPosts = [];
    let activeCategory = null;
    let activeTag = null;
    let searchQuery = '';

    const SITE_URL = 'https://germanvelasquez.co';

    function formatDate(dateStr) {
      const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      const d = new Date(dateStr + 'T00:00:00');
      return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    }

    function shareLinkedIn(url, title) {
      const shareUrl = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(url) + '&title=' + encodeURIComponent(title);
      window.open(shareUrl, '_blank', 'width=600,height=500');
    }

    function shareWhatsApp(url, title) {
      const text = encodeURIComponent(title + ' — ' + url);
      window.open('https://wa.me/?text=' + text, '_blank', 'width=600,height=500');
    }

    function getUniqueCategories(posts) {
      return [...new Set(posts.map(p => p.category))].sort();
    }

    function getUniqueTags(posts) {
      const tags = new Set();
      posts.forEach(p => (p.tags || []).forEach(t => tags.add(t)));
      return [...tags].sort();
    }

    function renderFilters(posts) {
      var catContainer=document.getElementById('category-filters');
      var tagContainer=document.getElementById('tag-filters');
      var chipContainer=document.getElementById('filter-chips');
      var categories=getUniqueCategories(posts);
      var tags=getUniqueTags(posts);
      catContainer.innerHTML=categories.map(function(c){
        return '<button class="filter-opt'+(activeCategory===c?' active':'')+'" data-filter="cat" data-value="'+c+'">'+c+'</button>';
      }).join('');
      tagContainer.innerHTML=tags.map(function(t){
        return '<button class="filter-opt'+(activeTag===t?' active':'')+'" data-filter="tag" data-value="'+t+'">'+t+'</button>';
      }).join('');
      // Active chips
      chipContainer.innerHTML='';
      if(activeCategory)chipContainer.innerHTML+='<span class="filter-chip">'+activeCategory+' <button data-clear="cat">&times;</button></span>';
      if(activeTag)chipContainer.innerHTML+='<span class="filter-chip">'+activeTag+' <button data-clear="tag">&times;</button></span>';
      // Events
      catContainer.querySelectorAll('.filter-opt').forEach(function(btn){
        btn.addEventListener('click',function(){
          activeCategory=(activeCategory===btn.dataset.value)?null:btn.dataset.value;
          renderFilters(allPosts);renderPosts();
        });
      });
      tagContainer.querySelectorAll('.filter-opt').forEach(function(btn){
        btn.addEventListener('click',function(){
          activeTag=(activeTag===btn.dataset.value)?null:btn.dataset.value;
          renderFilters(allPosts);renderPosts();
        });
      });
      chipContainer.querySelectorAll('[data-clear]').forEach(function(b){
        b.addEventListener('click',function(){
          if(b.dataset.clear==='cat')activeCategory=null;else activeTag=null;
          renderFilters(allPosts);renderPosts();
        });
      });
    }

    function filterPosts() {
      return allPosts.filter(p => {
        // Search filter
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          const matchTitle = p.title.toLowerCase().includes(q);
          const matchExcerpt = p.excerpt.toLowerCase().includes(q);
          const matchTags = (p.tags || []).some(t => t.toLowerCase().includes(q));
          const matchCategory = p.category.toLowerCase().includes(q);
          if (!matchTitle && !matchExcerpt && !matchTags && !matchCategory) return false;
        }
        // Category filter
        if (activeCategory && p.category !== activeCategory) return false;
        // Tag filter
        if (activeTag && !(p.tags || []).includes(activeTag)) return false;
        return true;
      });
    }

    function renderPosts() {
      const grid = document.getElementById('blog-grid');
      const noResults = document.getElementById('no-results');
      const posts = filterPosts();

      if (posts.length === 0) {
        grid.innerHTML = '';
        noResults.style.display = 'block';
        return;
      }

      noResults.style.display = 'none';
      grid.innerHTML = posts.map(p => {
        const postUrl = SITE_URL + '/blog/post.html?id=' + p.id;
        const tagsHtml = (p.tags || []).map(t => `<span class="blog-tag">${t}</span>`).join('');
        return `<div class="blog-card" data-slug="${p.id}">
          <div class="blog-date">${formatDate(p.date)}</div>
          <span class="blog-category">${p.category}</span>
          <h3>${p.title}</h3>
          <p>${p.excerpt}</p>
          <div class="blog-tags">${tagsHtml}</div>
          <div class="blog-read">${p.read_time} de lectura</div>
          <div class="blog-share">
            <button class="blog-share-btn" title="Compartir en LinkedIn" data-action="linkedin" data-url="${postUrl}" data-title="${p.title.replace(/"/g, '"')}">
              <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </button>
            <button class="blog-share-btn" title="Compartir en WhatsApp" data-action="whatsapp" data-url="${postUrl}" data-title="${p.title.replace(/"/g, '"')}">
              <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            </button>
          </div>
        </div>`;
      }).join('');

      // Attach card click handlers
      grid.querySelectorAll('.blog-card').forEach(card => {
        card.addEventListener('click', (e) => {
          // Don't navigate if clicking share buttons
          if (e.target.closest('.blog-share-btn')) return;
          const slug = card.dataset.slug;
          window.location.href = SITE_URL + '/blog/post.html?id=' + slug;
        });
      });

      // Attach share button handlers
      grid.querySelectorAll('.blog-share-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const action = btn.dataset.action;
          const url = btn.dataset.url;
          const title = btn.dataset.title;
          if (action === 'linkedin') shareLinkedIn(url, title);
          else if (action === 'whatsapp') shareWhatsApp(url, title);
        });
      });
    }

    // Search input listener
    document.getElementById('blog-search').addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      renderPosts();
    });
    // Filters toggle
    (function(){
      var t=document.getElementById('filters-toggle');
      var p=document.getElementById('filters-panel');
      if(t&&p){
        t.addEventListener('click',function(){
          t.classList.toggle('active');
          p.classList.toggle('open');
        });
      }
    })();

    // Load posts
    // Build nav from content.json
    fetch('content.json').then(r=>r.json()).then(nc=>{
      document.getElementById('nav-logo-blog').textContent=nc.site.logo;
      const navEl=document.getElementById('nav-links-blog');
      const mobileEl=document.getElementById('mobile-nav-links');
      const navCta=['conversemos'];
      (nc.nav&&nc.nav.items||[]).forEach(item=>{
        const label=item.label||item;
        const href=item.url||'#';
        const base='/';
        const resolvedHref=href.startsWith('#')?base+href:href.startsWith('http')||href.startsWith('mailto:')?href:base+href;
        const isCta=navCta.includes(label.toLowerCase());
        const linkHtml=isCta?`<a href="${resolvedHref}" class="nav-cta" style="display:inline-block;margin-top:8px">${label}</a>`:`<a href="${resolvedHref}" onclick="toggleMobile()">${label}</a>`;
        navEl.innerHTML+=isCta?`<a href="${resolvedHref}" class="nav-cta">${label}</a>`:`<a href="${resolvedHref}">${label}</a>`;
        mobileEl.innerHTML+=linkHtml;
      });
    }).catch(()=>{});

    fetch('blog/content.json').then(r => r.json()).then(data => {
      allPosts = data.posts || [];
      renderFilters(allPosts);
      renderPosts();
    }).catch(err => {
      console.error('Error loading blog content:', err);
      document.getElementById('blog-grid').innerHTML = '<p style="color:var(--gray-500);text-align:center">Error cargando posts.</p>';
    });
  </script>

  <script src="js/nav.js"></script>
</body>
</html>
