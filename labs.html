<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labs — Germán Velásquez</title>
  <meta name="description" content="Experimentos, ideas locas y repositorios en construcción.">
  <meta property="og:title" content="Labs — Germán Velásquez">
  <meta property="og:description" content="Experimentos, ideas y código en construcción.">
  <meta property="og:url" content="https://germanvelasquez.co/labs.html">
  <meta name="twitter:card" content="summary">
  <link rel="canonical" href="https://germanvelasquez.co/labs.html">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--orange:#FF6B2C;--orange-light:#FF8F5E;--orange-dark:#E85520;--orange-glow:rgba(255,107,44,0.15);--orange-glow2:rgba(255,107,44,0.08);--black:#0A0A0A;--dark:#1A1A1A;--gray-100:#F2F2F2;--gray-300:#CCC;--gray-500:#888;--gray-700:#555;--white:#FFF;--font:'Montserrat',sans-serif;--mono:'JetBrains Mono',monospace;--radius:12px;--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);color:var(--dark);background:var(--white);line-height:1.6;-webkit-font-smoothing:antialiased}
    nav{position:fixed;top:0;width:100%;z-index:1000;transition:var(--transition);background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);box-shadow:0 1px 20px rgba(0,0,0,0.06)}
    .nav-inner{max-width:1200px;margin:0 auto;padding:20px 40px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-size:18px;font-weight:700;color:var(--black);text-decoration:none;letter-spacing:-0.3px}
    .nav-links{display:flex;gap:32px;align-items:center}
    .nav-links a{font-size:13px;font-weight:500;color:var(--gray-700);text-decoration:none;letter-spacing:0.5px;text-transform:uppercase;transition:var(--transition)}
    .nav-links a:hover,.nav-links a.active{color:var(--orange)}
    .nav-cta{font-size:13px!important;font-weight:600!important;color:var(--white)!important;background:var(--orange);padding:10px 20px;border-radius:100px;text-transform:uppercase!important;letter-spacing:0.5px;transition:var(--transition)}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;z-index:1001}
    .hamburger span{width:24px;height:2px;background:var(--black);border-radius:2px}
    .mobile-menu{display:none;position:fixed;inset:0;background:var(--white);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:24px}
    .mobile-menu.open{display:flex}.mobile-menu a{font-size:20px;font-weight:600;color:var(--dark);text-decoration:none}
    .mobile-close{position:absolute;top:20px;right:20px;background:none;border:none;font-size:28px;cursor:pointer}
    /* Labs hero */
    .labs-hero{padding:140px 40px 60px;background:var(--black);position:relative;overflow:hidden;text-align:center}
    .labs-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,var(--orange-glow) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(37,99,235,0.08) 0%,transparent 60%);pointer-events:none}
    .labs-hero h1{font-size:48px;font-weight:800;letter-spacing:-2px;color:var(--white);margin-bottom:16px;position:relative}
    .labs-hero h1 em{font-style:normal;color:var(--orange)}
    .labs-hero p{font-size:18px;color:var(--gray-300);max-width:600px;margin:0 auto;position:relative}
    /* Content */
    .labs-section{padding:60px 40px}.container{max-width:900px;margin:0 auto}
    .section-title{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
    .section-desc{font-size:15px;color:var(--gray-700);margin-bottom:32px}
    /* Repo cards */
    .repo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
    .repo-card{border:1px dashed var(--gray-300);border-radius:var(--radius);padding:20px;transition:var(--transition);position:relative;overflow:hidden}
    .repo-card:hover{border-color:var(--orange);border-style:solid;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.06)}
    .repo-card.featured{border-color:var(--orange);border-style:solid;background:var(--orange-glow2)}
    .repo-card h3{font-size:16px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
    .repo-card h3 a{color:var(--dark);text-decoration:none}.repo-card h3 a:hover{color:var(--orange)}
    .repo-card .badge{font-size:10px;font-weight:600;color:var(--orange);background:var(--orange-glow2);padding:2px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:0.5px}
    .repo-card .badge. Featured{background:var(--orange);color:#fff}
    .repo-card p{font-size:14px;color:var(--gray-700);line-height:1.6}
    .repo-meta{display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--gray-500);font-family:var(--mono)}
    .repo-meta span{display:flex;align-items:center;gap:4px}
    /* Ideas section */
    .ideas-grid{display:grid;gap:12px}
    .idea-card{border:1px solid var(--gray-100);border-left:3px solid var(--orange);border-radius:var(--radius);padding:16px 20px}
    .idea-card h4{font-size:15px;font-weight:700;margin-bottom:4px}
    .idea-card p{font-size:13px;color:var(--gray-700)}
    .idea-status{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:2px 8px;border-radius:100px;display:inline-block;margin-top:8px}
    .status-idea{background:#f3f4f6;color:#555}
    .status-wip{background:#fef3c7;color:#92400e}
    .status-done{background:#d1fae5;color:#065f46}
    footer{background:var(--black);border-top:1px solid rgba(255,255,255,0.06);padding:32px 40px;text-align:center;font-size:13px;color:var(--gray-500)}
    footer a{color:var(--gray-500);text-decoration:none}footer a:hover{color:var(--orange)}
    @media(max-width:768px){.repo-grid{grid-template-columns:1fr}.labs-hero h1{font-size:36px}.nav-links{display:none}.hamburger{display:flex}.labs-hero{padding:120px 20px 40px}.labs-section{padding:40px 20px}}
  </style>
  <link rel="stylesheet" href="css/nav.css">
</head>
<body>
  <nav class="nav-light" id="nav"><div class="nav-inner">
    <a href="/" class="nav-logo" id="nav-logo"></a>
    <div class="nav-links" id="nav-links"></div>
    <button class="hamburger" onclick="toggleMobile()" aria-label="Menu"><span></span><span></span><span></span></button>
  </div></nav>
  <div class="mobile-menu" id="mobileMenu"><button class="mobile-close" onclick="toggleMobile()">x</button><div id="mobile-nav-links"></div></div></div>

  <section class="labs-hero">
    <h1><em>Labs</em> — Experimentos y código</h1>
    <p id="labs-desc"></p>
  </section>

  <section class="labs-section">
    <div class="container">
      <h2 class="section-title">Repositorios</h2>
      <p class="section-desc">Lo que tengo público en GitHub. Algunos son productos, otros solo experimentos.</p>
      <div class="repo-grid" id="repos-grid">
        <div class="repo-card"><p style="color:#888">Cargando repos...</p></div>
      </div>
    </div>
  </section>

  <section class="labs-section" style="background:var(--gray-100)">
    <div class="container">
      <h2 class="section-title">Ideas en el tintero</h2>
      <p class="section-desc">Cosas que estoy pensando, probando o dejando de lado. Algunas algún día serán productos.</p>
      <div class="ideas-grid" id="ideas-grid"></div>
    </div>
  </section>

  <footer>
    <a href="https://www.linkedin.com/in/germanvelasquezco" target="_blank">LinkedIn</a>
    <a href="https://github.com/gvelasquez85" target="_blank">GitHub</a>
    <a href="mailto:gvelasquez85@gmail.com">Email</a>
  </footer>

  <script>
    function toggleMobile(){document.getElementById('mobileMenu').classList.toggle('open')}

    // Load content.json for nav + labs config
    fetch('content.json').then(r=>r.json()).then(c=>{
      // Nav
      document.getElementById('nav-logo-labs').textContent=c.site.logo;
      const navEl=document.getElementById('nav-links-labs'),mobileEl=document.getElementById('mobile-nav-links');
      const navCta=['conversemos'];
      (c.nav&&c.nav.items||[]).forEach(item=>{
        const label=item.label||item,href=item.url||'#';
        const resolvedHref=href.startsWith('#')?'/'+href:href.startsWith('http')||href.startsWith('mailto:')?href:'/'+href;
        const isCta=navCta.includes(label.toLowerCase());
        navEl.innerHTML+=isCta?`<a href="${resolvedHref}" class="nav-cta">${label}</a>`:`<a href="${resolvedHref}" ${href=='labs.html'?'class="active"':''}>${label}</a>`;
        mobileEl.innerHTML+=`<a href="${resolvedHref}" onclick="toggleMobile()">${label}</a>`;
      });
      // Labs config
      document.getElementById('labs-desc').textContent=c.labs.desc;
      // Load GitHub repos
      const user=c.labs.github_user||'gvelasquez85';
      const featured=(c.labs.featured_repos||[]);
      return fetch('https://api.github.com/users/'+user+'repos?sort=updated&per_page=100').then(r=>r.json()).then(repos=>{
        if(!Array.isArray(repos)){document.getElementById('repos-grid').innerHTML='<p style="color:#888">No se pudieron cargar los repos</p>';return}
        const grid=document.getElementById('repos-grid');grid.innerHTML='';
        repos.filter(r=>!r.fork).sort((a,b)=>b.stargazers_count-a.stargazers_count).forEach(r=>{
          const isFeatured=featured.includes(r.name);
          const lang=r.language||'';
          grid.innerHTML+=`<div class="repo-card ${isFeatured?'featured':''}">
            <h3><a href="${r.html_url}" target="_blank">${r.name}</a> ${isFeatured?'<span class="badge Featured">★ Destacado</span>':''}</h3>
            <p>${r.description||'Sin descripción'}</p>
            <div class="repo-meta">
              ${lang?'<span>● '+lang+'</span>':''}
              <span>★ ${r.stargazers_count}</span>
              <span> ${r.forks_count}</span>
              <span>Actualizado ${new Date(r.updated_at).toLocaleDateString('es')}</span>
            </div>
          </div>`;
        });
      });
    }).catch(()=>{document.getElementById('repos-grid').innerHTML='<p style="color:#dc2626">Error cargando repos</p>'});
  </script>

  <script src="js/nav.js"></script>
</body>
</html>
