<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Germán Velásquez — CX + IA</title>
  <meta name="description" content="Experiencia del cliente e inteligencia artificial, aplicadas a problemas reales de negocio">
  <meta property="og:title" content="Germán Velásquez — CX + IA">
  <meta property="og:description" content="Transformo la forma en que las empresas entienden, sirven y retienen a sus clientes">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="canonical" href="https://germanvelasquez.co/">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--orange:#FF6B2C;--orange-light:#FF8F5E;--orange-dark:#E85520;--orange-glow:rgba(255,107,44,0.15);--orange-glow2:rgba(255,107,44,0.08);--black:#0A0A0A;--dark:#1A1A1A;--gray-900:#2D2D2D;--gray-700:#555555;--gray-500:#888888;--gray-300:#CCCCCC;--gray-100:#F2F2F2;--white:#FFFFFF;--blue:#2563EB;--blue-light:#3B82F6;--blue-glow:rgba(37,99,235,0.12);--font:'Montserrat',sans-serif;--radius:12px;--radius-lg:20px;--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
    *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
    body{font-family:var(--font);color:var(--dark);background:var(--white);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    /* Nav handled by css/nav.css */
    .hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;background:var(--black)}
    .hero-bg{position:absolute;inset:0;z-index:1}
    .hero-bg .gradient1{position:absolute;width:800px;height:800px;background:radial-gradient(circle,var(--orange-glow) 0%,transparent 70%);top:-200px;right:-100px;animation:float 8s ease-in-out infinite}
    .hero-bg .gradient2{position:absolute;width:600px;height:600px;background:radial-gradient(circle,var(--blue-glow) 0%,transparent 70%);bottom:-200px;left:-100px;animation:float 10s ease-in-out infinite reverse}
    .hero-bg .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:60px 60px}
    @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
    .hero-content{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:0 40px;width:100%}
    .hero-text .label{display:inline-flex;align-items:center;gap:10px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--orange);margin-bottom:24px}
    .label-dot{width:8px;height:8px;background:var(--orange);border-radius:50%;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .hero-text h1{font-size:60px;font-weight:800;line-height:1.05;letter-spacing:-2.5px;color:var(--white);margin-bottom:24px;max-width:900px}
    .hero-text h1 em{font-style:normal;background:linear-gradient(135deg,var(--orange),var(--orange-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hero-text p{font-size:18px;font-weight:400;color:var(--gray-300);line-height:1.7;margin-bottom:36px;max-width:640px}
    .hero-actions{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font);font-size:14px;font-weight:600;padding:14px 28px;border-radius:100px;text-decoration:none;transition:var(--transition);cursor:pointer;border:none}
    .btn-primary{color:var(--white);background:var(--orange)}.btn-primary:hover{background:var(--orange-dark);transform:translateY(-2px);box-shadow:0 8px 24px var(--orange-glow)}
    .btn-secondary{color:var(--white);background:transparent;border:1.5px solid rgba(255,255,255,0.2)}.btn-secondary:hover{border-color:var(--orange);color:var(--orange)}
    .btn .arrow{transition:transform 0.2s}.btn:hover .arrow{transform:translateX(3px)}
    section{padding:100px 40px}.container{max-width:1200px;margin:0 auto}
    .section-label{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--orange);margin-bottom:16px}
    .section-title{font-size:40px;font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin-bottom:16px}
    .section-desc{font-size:17px;color:var(--gray-700);line-height:1.7;max-width:560px}
    .how{background:var(--gray-100)}
    .steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:48px}
    .step-card{background:var(--white);border-radius:var(--radius);padding:32px 24px;position:relative;overflow:hidden;transition:var(--transition);border:1px solid transparent}
    .step-card:hover{border-color:var(--orange);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.08)}
    .step-card::before{content:attr(data-step);position:absolute;top:16px;right:20px;font-size:64px;font-weight:900;color:var(--gray-100);line-height:1;z-index:0}
    .step-icon{width:48px;height:48px;background:var(--orange-glow2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:20px;position:relative;z-index:1}
    .step-card h3{font-size:18px;font-weight:700;margin-bottom:8px;position:relative;z-index:1}
    .step-card p{font-size:14px;color:var(--gray-700);line-height:1.6;position:relative;z-index:1}
    .why-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:48px;align-items:start}
    .stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:32px}
    .stat-card{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--radius);padding:24px;transition:var(--transition)}.stat-card:hover{border-color:var(--orange)}
    .stat-value{font-size:36px;font-weight:800;letter-spacing:-1px;color:var(--orange)}.stat-label{font-size:13px;color:var(--gray-700);margin-top:4px}
    .diff-card{background:var(--black);border-radius:var(--radius-lg);padding:36px;color:var(--white)}.diff-card h3{font-size:20px;font-weight:700;margin-bottom:20px}
    .diff-item{padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;gap:12px;align-items:flex-start}.diff-item:last-child{border-bottom:none}
    .diff-icon{font-size:16px;flex-shrink:0;margin-top:2px}.diff-item strong{font-weight:600;color:var(--orange)}.diff-item span{font-size:14px;color:var(--gray-300);line-height:1.5}
    .build-section{background:var(--black);color:var(--white)}.build-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:48px}
    .build-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:28px;transition:var(--transition)}
    .build-card:hover{background:rgba(255,255,255,0.08);border-color:var(--orange);transform:translateY(-4px)}
    .build-emoji{font-size:32px;margin-bottom:16px}.build-card h3{font-size:18px;font-weight:700;margin-bottom:8px}.build-card p{font-size:14px;color:var(--gray-300);line-height:1.6}
    .projects-section{background:var(--gray-100)}.project-showcase{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:48px}
    .project-card{background:var(--white);border-radius:var(--radius-lg);overflow:hidden;transition:var(--transition);border:1px solid transparent}
    .project-card:hover{transform:translateY(-6px);box-shadow:0 20px 48px rgba(0,0,0,0.1)}
    .project-card-lynkko:hover{border-color:#166534}.project-card-turnflow:hover{border-color:#0369a1}
    .project-hero{height:220px;position:relative;overflow:hidden}
    .project-hero-lynkko{background:linear-gradient(135deg,#0f172a 0%,#1e293b 40%,#166534 100%)}
    .project-hero-turnflow{background:linear-gradient(135deg,#0f172a 0%,#0c4a6e 40%,#0369a1 100%)}
    .project-logo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:42px;font-weight:900;color:var(--white);letter-spacing:-2px}
    .project-logo .accent-lynkko{color:#facc15}.project-logo .accent-turnflow{color:#bae6fd}
    .project-badge{position:absolute;top:16px;right:16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:4px 12px;border-radius:100px}
    .badge-flagship{background:#166534;color:var(--white)}.badge-live{background:#0369a1;color:var(--white)}
    .project-body{padding:28px}.project-body h3{font-size:24px;font-weight:800;margin-bottom:4px}
    .project-url{font-size:13px;text-decoration:none;font-weight:500}.project-url-lynkko{color:#166534}.project-url-turnflow{color:#0369a1}
    .project-body>p{font-size:15px;color:var(--gray-700);line-height:1.6;margin:16px 0}
    .project-stats{display:flex;gap:24px;margin-bottom:16px}.project-stat{text-align:center}
    .project-stat-val-lynkko{font-size:24px;font-weight:800;color:#166534}.project-stat-val-turnflow{font-size:24px;font-weight:800;color:#0369a1}
    .project-stat-lbl{font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px}
    .project-tags{display:flex;flex-wrap:wrap;gap:6px}
    .project-tag{font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:0.3px}
    .project-tag-lynkko{color:#14532d;background:#f0fdf4;border:1px solid #bbf7d0}.project-tag-turnflow{color:#0c4a6e;background:#f0f9ff;border:1px solid #bae6fd}
    .project-cta{margin-top:20px;display:flex;gap:12px}
    .btn-lynkko,.btn-turnflow{display:inline-flex;align-items:center;gap:8px;font-family:var(--font);font-size:14px;font-weight:600;padding:14px 28px;border-radius:100px;text-decoration:none;transition:var(--transition);border:none;cursor:pointer}
    .btn-lynkko{color:var(--white);background:#166534}.btn-lynkko:hover{background:#14532d;transform:translateY(-2px)}
    .btn-turnflow{color:var(--white);background:#0369a1}.btn-turnflow:hover{background:#075985;transform:translateY(-2px)}
    .btn-lynkko .arrow,.btn-turnflow .arrow{transition:transform 0.2s}.btn-lynkko:hover .arrow,.btn-turnflow:hover .arrow{transform:translateX(3px)}
    /* Blog */
    .blog-section{background:var(--white)}
    .blog-filters{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:40px;margin-bottom:24px}
    .blog-search{flex:1;min-width:200px;padding:12px 16px;border:1px solid var(--gray-100);border-radius:100px;font-family:var(--font);font-size:14px;outline:none;transition:var(--transition)}
    .blog-search:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-glow)}
    .blog-filter-btn{font-size:12px;font-weight:600;padding:8px 16px;border-radius:100px;border:1px solid var(--gray-100);background:var(--white);color:var(--gray-700);cursor:pointer;transition:var(--transition);text-transform:uppercase;letter-spacing:0.5px}
    .blog-filter-btn:hover,.blog-filter-btn.active{border-color:var(--orange);color:var(--orange);background:var(--orange-glow2)}
    .blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .blog-card{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--radius);padding:28px;transition:var(--transition);display:flex;flex-direction:column;cursor:pointer}
    .blog-card:hover{border-color:var(--orange);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.06)}
    .blog-date{font-size:12px;color:var(--gray-500);margin-bottom:8px;font-weight:500}
    .blog-card h3{font-size:18px;font-weight:700;margin-bottom:10px;line-height:1.3}
    .blog-card p{font-size:14px;color:var(--gray-700);line-height:1.6;flex:1}
    .blog-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
    .blog-tag{font-size:10px;font-weight:600;color:var(--orange);background:var(--orange-glow2);padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:0.5px}
    .blog-category{font-size:10px;font-weight:600;color:var(--white);background:var(--orange);padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:0.5px}
    .blog-read{font-size:12px;color:var(--gray-500);margin-top:12px;font-weight:500}
    .blog-share{margin-top:12px;display:flex;gap:8px}
    .blog-share-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--gray-100);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:var(--transition)}
    .blog-share-btn:hover{border-color:var(--orange);color:var(--orange)}
    .blog-more{margin-top:36px;text-align:center}
    .cta-section{background:var(--black);color:var(--white);text-align:center}
    .cta-section h2{font-size:44px;font-weight:800;letter-spacing:-1.5px;line-height:1.1;max-width:700px;margin:0 auto 20px}
    .cta-section p{font-size:17px;color:var(--gray-300);margin-bottom:36px}
    footer{background:var(--black);border-top:1px solid rgba(255,255,255,0.06);padding:32px 40px}
    .footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--gray-500)}
    .footer-links{display:flex;gap:24px}.footer-links a{color:var(--gray-500);text-decoration:none;transition:var(--transition)}.footer-links a:hover{color:var(--orange)}
    .reveal{opacity:0;transform:translateY(30px);transition:opacity 0.7s ease,transform 0.7s ease}.reveal.visible{opacity:1;transform:translateY(0)}
    @media(max-width:1024px){.hero-content{max-width:100%}.steps-grid{grid-template-columns:repeat(2,1fr)}.build-grid{grid-template-columns:repeat(2,1fr)}.why-grid{grid-template-columns:1fr}.project-showcase{grid-template-columns:1fr}.blog-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:768px){.hero-text h1{font-size:36px;letter-spacing:-1.5px}.hero{min-height:auto;padding:120px 20px 60px}section{padding:60px 20px}.nav-links{display:none}.hamburger{display:flex}.steps-grid{grid-template-columns:1fr}.build-grid{grid-template-columns:1fr}.stat-row{grid-template-columns:1fr}.section-title{font-size:28px}.cta-section h2{font-size:28px}.nav-inner{padding:16px 20px}.blog-grid{grid-template-columns:1fr}.blog-filters{flex-direction:column}}
  </style>
  <link rel="stylesheet" href="css/nav.css">
</head>
<body>
  <nav class="nav-dark" id="nav"><div class="nav-inner">
    <a href="/" class="nav-logo" id="nav-logo"></a>
    <div class="nav-links" id="nav-links"></div>
    <button class="hamburger" onclick="toggleMobile()" aria-label="Menu"><span></span><span></span><span></span></button>

  <div class="mobile-menu" id="mobileMenu"><button class="mobile-close" onclick="toggleMobile()">x</button><div id="mobile-nav-links"></div></div>

  <section class="hero" id="hero">
    <div class="hero-bg"><div class="gradient1"></div><div class="gradient2"></div><div class="grid"></div></div>
    <div class="hero-content"><div class="hero-text">
      <div class="label" id="hero-label-wrap"><span class="label-dot"></span> <span id="hero-label"></span></div>
      <h1><span id="hero-t1"></span> <em id="hero-t2"></em></h1>
      <p id="hero-desc"></p>
      <div class="hero-actions">
        <a href="mailto:gvelasquez85@gmail.com" class="btn btn-primary"><span id="hero-cta1"></span> <span class="arrow">&#x2192;</span></a>
        <a href="#como" class="btn btn-secondary" id="hero-cta2"></a>
      </div>
    </div></div>
  </section>

  <section class="how" id="como"><div class="container reveal">
    <div class="section-label" id="how-label"></div>
    <h2 class="section-title"><span id="how-t1"></span><br><span id="how-t2"></span></h2>
    <p class="section-desc" id="how-desc"></p>
    <div class="steps-grid" id="steps-grid"></div>
  </div></section>

  <section id="porque"><div class="container reveal">
    <div class="section-label" id="why-label"></div>
    <h2 class="section-title"><span id="why-t1"></span><br><span id="why-t2"></span></h2>
    <div class="why-grid">
      <div><p class="section-desc" id="why-desc"></p><div class="stat-row" id="stat-row"></div></div>

    </div>
  </div></section>

  <section class="build-section" id="construyo"><div class="container reveal">
    <div class="section-label" id="build-label"></div>
    <h2 class="section-title" style="color:var(--white)" id="build-title"></h2>
    <div class="build-grid" id="build-grid"></div>
  </div></section>

  <section class="projects-section" id="proyectos"><div class="container reveal">
    <div class="section-label" id="proj-label"></div>
    <h2 class="section-title"><span id="proj-t1"></span><br><span id="proj-t2"></span></h2>
    <p class="section-desc" id="proj-desc"></p>
    <div class="project-showcase" id="project-showcase"></div>
  </div></section>

  <section class="blog-section" id="blog"><div class="container reveal">
    <div class="section-label" id="blog-label"></div>
    <h2 class="section-title" id="blog-title"></h2>
    <p class="section-desc" id="blog-desc"></p>
    <div class="blog-filters" id="blog-filters"></div>
    <div class="blog-grid" id="blog-grid"></div>
  </div></section>

  <section class="cta-section" id="contacto"><div class="container reveal">
    <h2><span id="cta-t1"></span><br><span id="cta-t2"></span></h2>
    <p id="cta-desc"></p>
    <div style="max-width:560px;margin:0 auto">
      <form id="contact-form" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:32px;backdrop-filter:blur(12px)">
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:13px;font-weight:600;color:var(--gray-300);margin-bottom:6px">Nombre completo <span style="color:#ef4444">*</span></label>
          <input type="text" name="full_name" required placeholder="Tu nombre" style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;font-family:Montserrat,sans-serif;font-size:14px;outline:none;transition:border-color 0.2s" onfocus="this.style.borderColor='var(--orange)'" onblur="this.style.borderColor='rgba(255,255,255,0.15)'">
        </div>
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:13px;font-weight:600;color:var(--gray-300);margin-bottom:6px">Teléfono / WhatsApp</label>
          <input type="tel" name="phone" placeholder="+57 300 000 0000" style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;font-family:Montserrat,sans-serif;font-size:14px;outline:none;transition:border-color 0.2s" onfocus="this.style.borderColor='var(--orange)'" onblur="this.style.borderColor='rgba(255,255,255,0.15)'">
        </div>
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:13px;font-weight:600;color:var(--gray-300);margin-bottom:6px">Correo electrónico</label>
          <input type="email" name="email" placeholder="tu@email.com" style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;font-family:Montserrat,sans-serif;font-size:14px;outline:none;transition:border-color 0.2s" onfocus="this.style.borderColor='var(--orange)'" onblur="this.style.borderColor='rgba(255,255,255,0.15)'">
        </div>
        <div style="margin-bottom:20px">
          <label style="display:block;font-size:13px;font-weight:600;color:var(--gray-300);margin-bottom:6px">¿Qué necesitas?</label>
          <textarea name="message" rows="3" placeholder="Cuéntame sobre tu reto de CX, IA o innovación..." style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;font-family:Montserrat,sans-serif;font-size:14px;outline:none;resize:none;transition:border-color 0.2s" onfocus="this.style.borderColor='var(--orange)'" onblur="this.style.borderColor='rgba(255,255,255,0.15)'"></textarea>
        </div>
        <div style="margin-bottom:20px;display:flex;flex-direction:column;gap:10px">
          <label style="display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--gray-300);cursor:pointer">
            <input type="checkbox" name="consent_data" required style="margin-top:2px;width:16px;height:16px;accent-color:var(--orange)">
            <span>Autorizo el tratamiento de mis datos personales. <a href="#" style="color:var(--orange);text-decoration:underline">Ver política</a></span>
          </label>
          <label style="display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--gray-300);cursor:pointer">
            <input type="checkbox" name="consent_marketing" style="margin-top:2px;width:16px;height:16px;accent-color:var(--orange)">
            <span>Acepto recibir contenido y novedades</span>
          </label>
        </div>
        <button type="submit" id="contact-submit" style="width:100%;padding:14px;background:var(--orange);color:#fff;font-family:Montserrat,sans-serif;font-size:14px;font-weight:600;border:none;border-radius:12px;cursor:pointer;transition:background 0.2s">Enviar mensaje</button>
        <div id="contact-feedback" style="margin-top:16px;text-align:center;font-size:14px;display:none"></div>
      </form>
    </div>
  </div></section>

  <footer><div class="footer-inner">
    <span>Germ&#x00e1;n Vel&#x00e1;squez &#x00b7; Cajic&#x00e1;, Colombia</span>
    <div class="footer-links">
      <a href="https://www.linkedin.com/in/germanvelasquezco" target="_blank">LinkedIn</a>
      <a href="https://turnflow.com.co" target="_blank">TurnFlow</a>
      <a href="https://lynkko.co" target="_blank">Lynkko</a>
      <a href="mailto:gvelasquez85@gmail.com">Email</a>
    </div>
  </div></footer>

  <script src="js/nav.js"></script>
  <script>
    const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible')})},{threshold:0.1});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

    fetch('content.json').then(r=>r.json()).then(c=>{
      // Load config separately
      fetch('config.json').then(r=>r.json()).then(cfg=>{
        // Inject GTM if configured
        if(cfg.gtm_id){const gtm=document.createElement('script');gtm.innerHTML=`(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','${cfg.gtm_id}');`;document.head.appendChild(gtm)}
        // Inject analytics if configured
        if(cfg.analytics_id){const ga=document.createElement('script');ga.async=true;ga.src=`https://www.googletagmanager.com/gtag/js?id=${cfg.analytics_id}`;document.head.appendChild(ga);const g2=document.createElement('script');g2.innerHTML=`window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','${cfg.analytics_id}');`;document.head.appendChild(g2)}
        if(cfg.site_description){document.querySelector('meta[name="description"]').content=cfg.site_description}
        if(cfg.site_url){document.querySelector('link[rel="canonical"]').href=cfg.site_url}
      }).catch(()=>{});

      const t=id=>document.getElementById(id);
      const s=(id,txt)=>{const e=t(id);if(e)e.textContent=txt};
      s('nav-logo',c.site.logo);
      // Nav is handled by js/nav.js — do not duplicate here
      s('hero-label',c.hero.label);s('hero-t1',c.hero.title_1);s('hero-t2',c.hero.title_2);s('hero-desc',c.hero.desc);s('hero-cta1',c.hero.cta_1);s('hero-cta2',c.hero.cta_2);
      s('how-label',c.how.label);s('how-t1',c.how.title_1);s('how-t2',c.how.title_2);s('how-desc',c.how.desc);
      const sg=t('steps-grid');
      c.how.steps.forEach((st,i)=>{sg.innerHTML+=`<div class="step-card" data-step="0${i+1}"><div class="step-icon">${st.icon}</div><h3>${st.title}</h3><p>${st.desc}</p></div>`});
      s('why-label',c.why.label);s('why-t1',c.why.title_1);s('why-t2',c.why.title_2);s('why-desc',c.why.desc);
      const sr=t('stat-row');c.why.stats.forEach(st=>{sr.innerHTML+=`<div class="stat-card"><div class="stat-value">${st.value}</div><div class="stat-label">${st.label}</div></div>`});
      const dl=t('diff-list');c.why.diffs.forEach(d=>{dl.innerHTML+=`<div class="diff-item"><span class="diff-icon">${d.icon}</span><span><strong>${d.bold}</strong>${d.text}</span></div>`});
      s('build-label',c.build.label);s('build-title',c.build.title);
      const bg=t('build-grid');c.build.items.forEach(b=>{bg.innerHTML+=`<div class="build-card"><div class="build-emoji">${b.emoji}</div><h3>${b.title}</h3><p>${b.desc}</p></div>`});
      s('proj-label',c.projects.label);s('proj-t1',c.projects.title_1);s('proj-t2',c.projects.title_2);s('proj-desc',c.projects.desc);
      const ps=t('project-showcase');
      const lk=c.projects.lynkko;
      ps.innerHTML+=`<div class="project-card project-card-lynkko"><div class="project-hero project-hero-lynkko"><div class="project-logo"><span class="accent-lynkko">L</span>ynkko</div><span class="project-badge badge-flagship">${lk.badge}</span></div><div class="project-body"><h3>Lynkko</h3><a href="https://lynkko.co" target="_blank" class="project-url project-url-lynkko">lynkko.co</a><p>${lk.desc}</p><div class="project-stats">${lk.stats.map(x=>`<div class="project-stat"><div class="project-stat-val-lynkko">${x.value}</div><div class="project-stat-lbl">${x.label}</div></div>`).join('')}</div><div class="project-tags">${lk.tags.map(x=>`<span class="project-tag project-tag-lynkko">${x}</span>`).join('')}</div><div class="project-cta"><a href="https://lynkko.co" target="_blank" class="btn-lynkko">Conocer Lynkko <span class="arrow">&#x2192;</span></a></div></div></div>`;
      const tf=c.projects.turnflow;
      ps.innerHTML+=`<div class="project-card project-card-turnflow"><div class="project-hero project-hero-turnflow"><div class="project-logo">Turn<span class="accent-turnflow">Flow</span></div><span class="project-badge badge-live">${tf.badge}</span></div><div class="project-body"><h3>TurnFlow</h3><a href="https://turnflow.com.co" target="_blank" class="project-url project-url-turnflow">turnflow.com.co</a><p>${tf.desc}</p><div class="project-stats">${tf.stats.map(x=>`<div class="project-stat"><div class="project-stat-val-turnflow">${x.value}</div><div class="project-stat-lbl">${x.label}</div></div>`).join('')}</div><div class="project-tags">${tf.tags.map(x=>`<span class="project-tag project-tag-turnflow">${x}</span>`).join('')}</div><div class="project-cta"><a href="https://turnflow.com.co" target="_blank" class="btn-turnflow">Conocer TurnFlow <span class="arrow">&#x2192;</span></a></div></div></div>`;
      // Blog
      s('blog-label',c.blog.label);s('blog-title',c.blog.title_1);s('blog-desc',c.blog.desc);
      const allPosts=c.blog.posts||[];
      const posts=allPosts.slice(0,3);
      // Also load full blog content from blog/content.json for search
      let fullPosts=[];
      fetch('blog/content.json').then(r=>r.json()).then(bc=>{fullPosts=bc.posts||[]}).catch(()=>{});
      // Extract unique categories for the link
      const blogUrl='blog.html';
      // Render blog posts - simple cards, no filters
      const bG=t('blog-grid');bG.innerHTML='';
      posts.forEach(p=>{
        const url=`blog/post.html?id=${p.id}`;
        bG.innerHTML+=`<div class="blog-card" onclick="location.href='${url}'"><div class="blog-date">${p.date}</div><span class="blog-category">${p.category}</span><h3>${p.title}</h3><p>${p.excerpt}</p><div class="blog-tags">${(p.tags||[]).map(tg=>`<span class="blog-tag">${tg}</span>`).join('')}</div><div class="blog-read">${p.read_time} de lectura</div></div>`;
      });
      // Replace filter area with link to full blog
      const bf=t('blog-filters');
      bf.innerHTML=`<a href="${blogUrl}" class="btn btn-primary" style="background:var(--dark)">Ver todo el blog <span class="arrow">&#x2192;</span></a>`;
      // CTA
      s('cta-t1',c.cta.title_1);s('cta-t2',c.cta.title_2);s('cta-desc',c.cta.desc);s('cta-btn',c.cta.cta_text);
    });
    // Contact form submit
    (function(){
      var cform=document.getElementById('contact-form');
      if(!cform)return;
      cform.addEventListener('submit',function(e){
        e.preventDefault();
        var fb=document.getElementById('contact-feedback');
        var btn=document.getElementById('contact-submit');
        var data={
          name:cform.querySelector('[name=full_name]').value,
          email:cform.querySelector('[name=email]').value,
          phone:cform.querySelector('[name=phone]').value,
          message:cform.querySelector('[name=message]').value,
          source:'web_contact_form'
        };
        if(!data.name){fb.style.display='block';fb.style.color='#fbbf24';fb.textContent='Tu nombre es obligatorio';return}
        btn.disabled=true;btn.textContent='Enviando...';
        fetch('/api/webhook.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
          .then(function(r){return r.json()})
          .then(function(res){
            if(res.ok){fb.style.display='block';fb.style.color='#22c55e';fb.textContent='¡Mensaje enviado! Te contacto pronto.';cform.reset()}
            else{fb.style.display='block';fb.style.color='#f87171';fb.textContent='Error: '+(res.error||'intentá de nuevo')}
          })
          .catch(function(){fb.style.display='block';fb.style.color='#f87171';fb.textContent='Error de conexión. Intentalo de nuevo.'})
          .finally(function(){btn.disabled=false;btn.textContent='Enviar mensaje'});
      });
    })();
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
