<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css">
<script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>
<title>CMS Admin — Germán Velásquez</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sidebar-bg: #0A0A0A;
  --sidebar-hover: #1a1a1a;
  --accent: #FF6B2C;
  --accent-hover: #e55a1b;
  --white: #ffffff;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --danger: #ef4444;
  --success: #10b981;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
}
body {
  font-family: 'Montserrat', sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  display: flex;
  min-height: 100vh;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--sidebar-bg);
  color: #fff;
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 100;
  overflow-y: auto;
}
.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-header h1 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.3;
}
.sidebar-header span {
  display: block;
  font-size: 11px;
  font-weight: 400;
  color: var(--gray-400);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.sidebar-nav { flex: 1; padding: 12px 0; }
.sidebar-nav button {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 12px 20px;
  background: none;
  border: none;
  color: var(--gray-400);
  font-family: 'Montserrat', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s ease;
  border-left: 3px solid transparent;
}
.sidebar-nav button:hover { background: var(--sidebar-hover); color: #fff; }
.sidebar-nav button.active {
  background: rgba(255,107,44,0.08);
  color: var(--accent);
  border-left-color: var(--accent);
}
.sidebar-nav button .nav-icon {
  margin-right: 10px;
  font-size: 15px;
  width: 20px;
  text-align: center;
}
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.btn-preview {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 10px 14px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.15s ease;
}
.btn-preview:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.4);
}
.btn-preview .icon { margin-right: 6px; }

/* MAIN */
.main {
  flex: 1;
  margin-left: 260px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.topbar h2 { font-size: 20px; font-weight: 600; color: var(--gray-900); }
.btn-save {
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  font-family: 'Montserrat', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.15s ease;
  box-shadow: var(--shadow);
}
.btn-save:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}
.btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.content-area { flex: 1; overflow-y: auto; padding: 32px; }

/* SECTIONS */
.section { display: none; }
.section.active { display: block; }

/* FORM */
.form-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.form-card h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-900);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--gray-100);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.field-row { margin-bottom: 14px; }
.field-row label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-600);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.field-row input[type="text"],
.field-row input[type="url"],
.field-row input[type="date"],
.field-row textarea,
.field-row select {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--gray-300);
  border-radius: 6px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13.5px;
  color: var(--gray-800);
  background: var(--white);
  transition: border-color 0.15s;
  resize: vertical;
}
.field-row input:focus,
.field-row textarea:focus,
.field-row select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,107,44,0.1);
}
.field-row textarea {
  min-height: 80px;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 12.5px;
}
.field-row textarea.tall { min-height: 300px; }

/* REPEATER */
.repeater-item {
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  position: relative;
}
.repeater-item .repeater-actions {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 4px;
}
.repeater-item .repeater-actions button {
  background: var(--white);
  border: 1px solid var(--gray-300);
  border-radius: 4px;
  width: 28px;
  height: 28px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.repeater-item .repeater-actions button:hover { background: var(--gray-100); }
.repeater-item .repeater-actions button.delete:hover {
  background: #fee2e2;
  border-color: var(--danger);
  color: var(--danger);
}
.repeater-item .repeater-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.repeater-item .repeater-fields.single { grid-template-columns: 1fr; }
.repeater-item .repeater-fields input,
.repeater-item .repeater-fields textarea {
  padding: 7px 10px;
  border: 1px solid var(--gray-300);
  border-radius: 5px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  width: 100%;
  resize: vertical;
}
.repeater-item .repeater-fields textarea { min-height: 60px; }
.repeater-item .repeater-fields label {
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: 0.03em;
  margin-bottom: 2px;
  display: block;
}
.btn-add {
  padding: 8px 16px;
  background: var(--white);
  border: 1.5px dashed var(--gray-300);
  color: var(--gray-600);
  font-family: 'Montserrat', sans-serif;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
  width: 100%;
  margin-top: 4px;
}
.btn-add:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(255,107,44,0.03);
}

/* BLOG LIST */
.blog-list { display: grid; gap: 12px; margin-bottom: 20px; }
.blog-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: 10px;
  padding: 18px 20px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  box-shadow: var(--shadow);
  transition: all 0.15s;
}
.blog-card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); }
.blog-card-info { flex: 1; min-width: 0; }
.blog-card-info h4 {
  font-size: 14.5px;
  font-weight: 600;
  color: var(--gray-900);
  margin-bottom: 4px;
}
.blog-card-info .blog-meta {
  font-size: 11.5px;
  color: var(--gray-500);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.blog-card-info .blog-meta .tag-pill {
  background: var(--gray-100);
  color: var(--gray-600);
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10.5px;
  font-weight: 500;
}
.blog-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
.blog-card-actions button {
  padding: 7px 14px;
  border-radius: 5px;
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--gray-300);
  background: var(--white);
  transition: all 0.15s;
}
.blog-card-actions button:hover { background: var(--gray-100); }
.blog-card-actions button.delete:hover {
  background: #fee2e2;
  border-color: var(--danger);
  color: var(--danger);
}
.blog-card-actions button.view { border-color: var(--accent); color: var(--accent); }
.blog-card-actions button.view:hover { background: rgba(255,107,44,0.06); }

/* BLOG EDITOR */
.blog-editor {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 24px;
  box-shadow: var(--shadow);
}
.blog-editor .editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--gray-100);
}
.blog-editor .editor-header h3 { font-size: 15px; font-weight: 600; }
.blog-editor .btn-back {
  padding: 6px 14px;
  border-radius: 5px;
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--gray-300);
  background: var(--white);
  transition: all 0.15s;
}
.blog-editor .btn-back:hover { background: var(--gray-100); }

/* TOAST */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 14px 20px;
  border-radius: 8px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  box-shadow: var(--shadow-lg);
  animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
  max-width: 380px;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.info { background: #3b82f6; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes fadeOut { to { opacity: 0; transform: translateX(40px); } }

/* ADMIN RESPONSIVE: show shared nav on mobile, hide sidebar */
@media(max-width:768px){
  .sidebar { display: none; }
  .main { margin-left: 0; }

  .topbar { margin-top: 56px; }
}

/* AUTH MODAL */
.auth-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
}
.auth-box {
  background: var(--white);
  border-radius: 16px;
  padding: 40px;
  width: 380px;
  max-width: 90vw;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
}
.auth-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--gray-900); }
.auth-box p { font-size: 13px; color: var(--gray-500); margin-bottom: 24px; }
.auth-box input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--gray-300);
  border-radius: 8px;
  font-family: 'Montserrat', sans-serif;
  font-size: 14px;
  margin-bottom: 16px;
  transition: border-color 0.15s;
}
.auth-box input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,107,44,0.1);
}
.auth-box button {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  font-family: 'Montserrat', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.15s;
}
.auth-box button:hover { background: var(--accent-hover); }
.auth-box .error-msg {
  color: var(--danger);
  font-size: 12px;
  margin-top: -8px;
  margin-bottom: 12px;
  display: none;
}

/* STATUS BAR */
.save-status { font-size: 11.5px; color: var(--gray-400); margin-right: 12px; }
.save-status.saving { color: var(--accent); }
.save-status.saved { color: var(--success); }
.save-status.error { color: var(--danger); }
</style>
</head>
<body>

<!-- AUTH MODAL -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2>CMS Admin</h2>
    <p>Ingresa la contraseña para acceder al panel de edición.</p>
    <input type="password" id="authPassword" placeholder="Contraseña" autofocus>
    <div class="error-msg" id="authError">Contraseña incorrecta.</div>
    <button onclick="submitAuth()">Acceder</button>
  </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>Germán Velásquez</h1>
    <span>CMS Admin</span>
  </div>
  <nav class="sidebar-nav" id="sidebarNav">
    <button class="active" data-section="hero"><span class="nav-icon">🏠</span>Hero</button>
    <button data-section="how"><span class="nav-icon">⚙️</span>Cómo trabajo</button>
    <button data-section="why"><span class="nav-icon">⭐</span>Por qué yo</button>
    <button data-section="build"><span class="nav-icon">🛠️</span>Servicios</button>
    <button data-section="projects"><span class="nav-icon">🚀</span>Proyectos</button>
    <button data-section="blog"><span class="nav-icon">📝</span>Blog Posts</button>
    <button data-section="cta"><span class="nav-icon">📣</span>CTA</button>
    <button data-section="nav" style="margin-top:12px;border-top:1px solid rgba(255,255,255,0.1);padding-top:12px"><span class="nav-icon">☰</span>Menú</button>
    <button data-section="config"><span class="nav-icon">⚙️</span>Config</button>
    <button data-section="contacts" style="margin-top:12px;border-top:1px solid rgba(255,255,255,0.1);padding-top:12px"><span class="nav-icon">👥</span>Contactos <span id="contact-count" style="background:#FF6B2C;color:#fff;font-size:10px;padding:2px 6px;border-radius:100px;margin-left:4px">0</span></button>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-preview" onclick="openPreview()"><span class="icon">👁️</span>Vista previa</button>
  </div>
</aside>


<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <h2 id="sectionTitle">Hero</h2>
    <div style="display:flex;align-items:center;">
      <span class="save-status" id="saveStatus"></span>
      <button class="btn-save" id="btnSave" onclick="saveContent()">💾 Guardar cambios</button>
    </div>
  </div>
  <div class="content-area" id="contentArea">
    <!-- Sections rendered here -->
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===== STATE =====
var contentData = null;
var currentSection = 'hero';
var editingPostId = null;
var DEFAULT_TOKEN = 'dev2026';

// ===== AUTH =====
function initAuth() {
  var stored = sessionStorage.getItem('cms-secret');
  if (stored) {
    document.getElementById('authOverlay').style.display = 'none';
    loadContent(stored);
  }
}

function submitAuth() {
  var pw = document.getElementById('authPassword').value;
  if (!pw) return;
  sessionStorage.setItem('cms-secret', pw);
  document.getElementById('authOverlay').style.display = 'none';
  loadContent(pw);
}

document.getElementById('authPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitAuth();
});

// ===== LOAD CONTENT =====
var blogPosts = [];
var SITE_URL = 'https://germanvelasquez.co';
function loadContent(token) {
  Promise.all([
    fetch('content.json?t=' + Date.now()).then(r=>r.json()),
    fetch('blog/content.json?t=' + Date.now()).then(r=>r.json()).catch(()=>({posts:[]}))
  ]).then(function(results){
    contentData = results[0];
    blogPosts = results[1].posts || [];
    // Ensure nav exists
    if(!contentData.nav) contentData.nav = {items:[]};
    renderAllSections();
    showToast('Contenido cargado correctamente', 'success');
  }).catch(function(err){
    showToast('Error al cargar contenido: ' + err.message, 'error');
  });
}

// ===== NAVIGATION =====
document.getElementById('sidebarNav').addEventListener('click', function(e) {
  var btn = e.target.closest('button[data-section]');
  if (!btn) return;
  currentSection = btn.dataset.section;
  editingPostId = null;
  var btns = document.querySelectorAll('#sidebarNav button');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  renderSection(currentSection);
  updateTitle();
});

function updateTitle() {
  var titles = {
    hero: 'Hero',
    how: 'Cómo trabajo',
    why: 'Por qué yo',
    build: 'Servicios',
    projects: 'Proyectos',
    blog: 'Blog Posts',
    cta: 'CTA'
  };
  document.getElementById('sectionTitle').textContent = titles[currentSection] || currentSection;
}

// ===== RENDER =====
function renderAllSections() {
  renderSection(currentSection);
}

function renderSection(name) {
  var area = document.getElementById('contentArea');
  area.innerHTML = '';
  if (name === 'hero') area.appendChild(renderHero());
  else if (name === 'how') area.appendChild(renderHow());
  else if (name === 'why') area.appendChild(renderWhy());
  else if (name === 'build') area.appendChild(renderBuild());
  else if (name === 'projects') area.appendChild(renderProjects());
  else if (name === 'blog') area.appendChild(renderBlog());
  else if (name === 'cta') area.appendChild(renderCTA());
  else if (name === 'nav') area.appendChild(renderNav());
  else if (name === 'config') area.appendChild(renderConfig());
  else if (name === 'contacts') area.appendChild(renderContacts());
}

// ===== HELPERS =====
function field(label, value, key, opts) {
  opts = opts || {};
  var div = document.createElement('div');
  div.className = 'field-row';
  var lbl = document.createElement('label');
  lbl.textContent = label;
  div.appendChild(lbl);
  var input;
  if (opts.type === 'textarea') {
    input = document.createElement('textarea');
    if (opts.tall) input.className = 'tall';
  } else {
    input = document.createElement('input');
    input.type = opts.type || 'text';
  }
  input.value = value || '';
  input.dataset.key = key;
  input.addEventListener('input', function(e) { setNestedValue(key, e.target.value); });
  div.appendChild(input);
  return div;
}

function setNestedPath(obj, path, value) {
  var keys = path.split('.');
  var cur = obj;
  for (var i = 0; i < keys.length - 1; i++) {
    var k = keys[i];
    if (!(k in cur)) cur[k] = {};
    cur = cur[k];
  }
  cur[keys[keys.length - 1]] = value;
}

function setNestedValue(path, value) {
  setNestedPath(contentData, path, value);
}

function getNestedValue(path) {
  return path.split('.').reduce(function(o, k) { return (o != null ? o[k] : ''); }, contentData) || '';
}

function repeater(items, path, fields, renderFn) {
  var container = document.createElement('div');
  container.className = 'repeater-container';
  container.dataset.path = path;

  for (var idx = 0; idx < items.length; idx++) {
    container.appendChild(repeaterItem(items[idx], idx, path, fields));
  }

  var addBtn = document.createElement('button');
  addBtn.className = 'btn-add';
  addBtn.textContent = '+ Agregar elemento';
  addBtn.onclick = function() {
    var arr = getNestedValue(path) || [];
    arr.push(renderFn());
    setNestedValue(path, arr);
    renderSection(currentSection);
  };
  container.appendChild(addBtn);
  return container;
}

function repeaterItem(item, idx, path, fields) {
  var div = document.createElement('div');
  div.className = 'repeater-item';

  var actions = document.createElement('div');
  actions.className = 'repeater-actions';
  var delBtn = document.createElement('button');
  delBtn.className = 'delete';
  delBtn.innerHTML = '🗑';
  delBtn.title = 'Eliminar';
  delBtn.onclick = function() {
    var arr = getNestedValue(path) || [];
    arr.splice(idx, 1);
    setNestedValue(path, arr);
    renderSection(currentSection);
  };
  actions.appendChild(delBtn);
  div.appendChild(actions);

  var fieldsDiv = document.createElement('div');
  fieldsDiv.className = 'repeater-fields' + (fields.length === 1 ? ' single' : '');

  for (var f = 0; f < fields.length; f++) {
    var fieldDef = fields[f];
    var wrap = document.createElement('div');
    var lbl = document.createElement('label');
    lbl.textContent = fieldDef.label;
    wrap.appendChild(lbl);
    var inp;
    if (fieldDef.type === 'textarea') {
      inp = document.createElement('textarea');
    } else {
      inp = document.createElement('input');
      inp.type = 'text';
    }
    inp.value = item[fieldDef.key] || '';
    (function(fieldDef, idx, path) {
      inp.addEventListener('input', function(e) {
        var arr = getNestedValue(path) || [];
        arr[idx][fieldDef.key] = e.target.value;
        setNestedValue(path, arr);
      });
    })(fieldDef, idx, path);
    wrap.appendChild(inp);
    fieldsDiv.appendChild(wrap);
  }

  div.appendChild(fieldsDiv);
  return div;
}

      if (post.tags && post.tags.length) {
        content += post.tags.map(function(t){ return '#' + t.replace(/\s+/g,''); }).join(' ') + '\n';
      }
      // Copy formatted content to clipboard and open Medium
      navigator.clipboard.writeText(content).then(function(){

    method: 'POST',

  })
    .then(function(res) { return res.json().then(function(d) { return { ok: res.ok, data: d }; }); })
    .then(function(result) {
      if (result.ok && result.data.success !== false) {
        status.textContent = '✓ Guardado';
        status.className = 'save-status saved';
        showToast('Contenido guardado correctamente', 'success');
      } else {
        throw new Error(result.data.error || 'Error del servidor');
      }
    })
    .catch(function(err) {
      status.textContent = '✗ Error';
      status.className = 'save-status error';
      showToast('Error al guardar: ' + err.message, 'error');
    })
    .then(function() {
      btn.disabled = false;
      setTimeout(function() { status.textContent = ''; status.className = 'save-status'; }, 4000);
    });
}

      lblInp.type = 'text'; lblInp.value = item.label || '';
      lblInp.placeholder = 'Ej: Blog';
      lblInp.style.cssText = 'flex:1;font-family:Montserrat,sans-serif;font-size:14px;padding:8px 10px;border:1px solid #ccc;border-radius:6px;';
      lblInp.addEventListener('input', function(e) { items[i].label = e.target.value; });
      lblRow.appendChild(lblInp);
      fieldsDiv.appendChild(lblRow);
      // URL
      var urlRow = document.createElement('div');
      urlRow.style.cssText = 'display:flex;gap:8px;align-items:center;';
      var urlLabel = document.createElement('span');
      urlLabel.textContent = 'URL:';
      urlLabel.style.cssText = 'font-size:11px;font-weight:600;text-transform:uppercase;color:#888;min-width:50px;';
      urlRow.appendChild(urlLabel);
      var urlInp = document.createElement('input');
      urlInp.type = 'text'; urlInp.value = item.url || '';
      urlInp.placeholder = 'Ej: #como, blog.html, https://...';
      urlInp.style.cssText = 'flex:1;font-family:Montserrat,sans-serif;font-size:14px;padding:8px 10px;border:1px solid #ccc;border-radius:6px;';
      urlInp.addEventListener('input', function(e) { items[i].url = e.target.value; });
      urlRow.appendChild(urlInp);
      fieldsDiv.appendChild(urlRow);
      row.appendChild(fieldsDiv);
      var del = document.createElement('button');
      del.textContent = '✕'; del.title = 'Eliminar';
      del.style.cssText = 'background:none;border:none;font-size:18px;cursor:pointer;color:#dc2626;padding-top:4px;';
      del.onclick = function() { items.splice(i, 1); contentData.nav.items = items; renderItems(); };
      row.appendChild(del);
      listDiv.appendChild(row);
    });
  }
  renderItems();
  f.appendChild(listDiv);
  var addBtn = document.createElement('button');
  addBtn.textContent = '+ Agregar item';
  addBtn.style.cssText = 'display:block;margin:12px 0;font-family:Montserrat,sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;border:1px dashed #FF6B2C;background:transparent;color:#FF6B2C;cursor:pointer;';
  addBtn.onclick = function() { items.push({ label: 'Nuevo', url: '#' }); contentData.nav.items = items; renderItems(); };
  f.appendChild(addBtn);
  var saveBtn = document.createElement('button');
  saveBtn.textContent = '💾 Guardar menú';
  saveBtn.className = 'btn-save';
  saveBtn.onclick = function() { contentData.nav = { items: items }; saveData(); };
  f.appendChild(saveBtn);
  return f;
}

// ===== CONFIG SECTION =====
function renderConfig() {
  var f = document.createElement('div');
  var h = document.createElement('h2'); h.textContent = 'Configuración del sitio'; f.appendChild(h);
  var p = document.createElement('p'); p.className = 'section-hint'; p.textContent = 'Estos valores se guardan en config.json (separado del contenido).'; f.appendChild(p);
  // Load config.json
  var cfg = {};
  var cfgLoaded = false;
  var cfgDiv = document.createElement('div');
  cfgDiv.id = 'config-fields';
  f.appendChild(cfgDiv);
  function renderCfgFields() {
    cfgDiv.innerHTML = '';
    var fields = [
      { key: 'gtm_id', label: 'Google Tag Manager ID', hint: 'Ej: GTM-XXXXXXX' },
      { key: 'analytics_id', label: 'Google Analytics ID', hint: 'Ej: G-XXXXXXXXXX' },
      { key: 'site_name', label: 'Nombre del sitio' },
      { key: 'site_url', label: 'URL del sitio' },
      { key: 'site_description', label: 'Descripción del sitio (SEO)' },
      { key: 'social_image', label: 'URL imagen social (OG image)' },
      { key: 'language', label: 'Idioma' },
      { key: 'author', label: 'Autor' },
      { key: 'author_email', label: 'Email del autor' },
      { key: 'linkedin', label: 'LinkedIn URL' },
      { key: 'twitter', label: 'Twitter handle' },
      { key: 'github', label: 'GitHub URL' }
    ];
    fields.forEach(function(fd) {
      var row = document.createElement('div'); row.className = 'field-row';
      var lbl = document.createElement('label'); lbl.textContent = fd.label; row.appendChild(lbl);
      if (fd.hint) { var h2 = document.createElement('small'); h2.textContent = fd.hint; h2.style.cssText = 'display:block;color:#888;font-size:11px;margin:2px 0'; row.appendChild(h2); }
      var inp = document.createElement('input'); inp.type = 'text';
      inp.value = cfg[fd.key] || '';
      inp.dataset.cfgKey = fd.key;
      inp.style.cssText = 'width:100%;font-family:Montserrat,sans-serif;font-size:14px;padding:10px 12px;border:1px solid #ccc;border-radius:8px;';
      row.appendChild(inp);
      cfgDiv.appendChild(row);
    });
  }
  // Fetch config.json
  fetch('config.json').then(function(r){return r.json()}).then(function(data){cfg=data;cfgLoaded=true;renderCfgFields()}).catch(function(){cfg={};renderCfgFields()});
  var saveBtn = document.createElement('button');
  saveBtn.textContent = '💾 Guardar configuración';
  saveBtn.className = 'btn-save';
  saveBtn.style.marginTop = '16px';
  saveBtn.onclick = function() {
    var inputs = cfgDiv.querySelectorAll('[data-cfg-key]');
    inputs.forEach(function(inp) { cfg[inp.dataset.cfgKey] = inp.value; });
    // Save config.json separately
    var secret = sessionStorage.getItem('cms-secret') || '';
    fetch('api/save.php?token=' + encodeURIComponent(secret) + '&file=config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(cfg)
    }).then(function(r){return r.json()}).then(function(res){
      if(res.ok) showToast('Configuración guardada');
      else showToast('Error: ' + (res.error||'unknown'), true);
    }).catch(function(){ showToast('Error de conexión', true); });
  };
  f.appendChild(saveBtn);
  return f;
}

// ===== CONTACTS MANAGER =====
function renderContacts() {
  var f = document.createElement('div');
  var h = document.createElement('h2'); h.textContent = 'Contactos'; f.appendChild(h);
  var p = document.createElement('p'); p.className = 'section-hint'; p.textContent = 'Contactos que llegaron por el formulario Lynkko. Actualiza su estado: nuevo, contactado, en proceso, cliente, descartado.'; f.appendChild(p);
  // Stats
  var statsDiv = document.createElement('div');
  statsDiv.id = 'contact-stats';
  statsDiv.style.cssText = 'display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;';
  f.appendChild(statsDiv);
  // Filter
  var filterDiv = document.createElement('div');
  filterDiv.style.cssText = 'margin-bottom:16px;';
  var statusFilter = document.createElement('select');
  statusFilter.id = 'contact-status-filter';
  statusFilter.style.cssText = 'font-family:Montserrat,sans-serif;font-size:13px;padding:8px 12px;border:1px solid #ccc;border-radius:8px;';
  statusFilter.innerHTML = '<option value="">Todos</option><option value="nuevo">Nuevos</option><option value="contactado">Contactados</option><option value="en proceso">En proceso</option><option value="cliente">Clientes</option><option value="recontacto">Recontactos</option><option value="descartado">Descartados</option>';
  filterDiv.appendChild(statusFilter);
  f.appendChild(filterDiv);
  // List
  var listDiv = document.createElement('div');
  listDiv.id = 'contacts-list';
  f.appendChild(listDiv);
  // Load contacts
  var secret = sessionStorage.getItem('cms-secret') || '';
  fetch('api/webhook.php?token=' + encodeURIComponent(secret)).then(function(r){return r.json()}).then(function(contacts){
    if (!Array.isArray(contacts)) contacts = [];
    document.getElementById('contact-count').textContent = contacts.length;
    // Stats
    var counts = {};
    contacts.forEach(function(c){ counts[c.status] = (counts[c.status]||0)+1; });
    statsDiv.innerHTML = '';
    var statuses = ['nuevo','contactado','en proceso','cliente','recontacto','descartado'];
    var labels = {'nuevo':'Nuevos','contactado':'Contactados','en proceso':'En proceso','cliente':'Clientes','recontacto':'Recontactos','descartado':'Descartados'};
    statuses.forEach(function(s){
      var badge = document.createElement('span');
      badge.style.cssText = 'font-size:12px;font-weight:600;padding:4px 12px;border-radius:100px;background:#f3f4f6;color:#555;';
      badge.textContent = (labels[s]||s) + ': ' + (counts[s]||0);
      statsDiv.appendChild(badge);
    });
    function renderList(filter) {
      listDiv.innerHTML = '';
      var filtered = filter ? contacts.filter(function(c){return c.status===filter}) : contacts;
      if (!filtered.length) { listDiv.innerHTML = '<p style="color:#888;text-align:center;padding:40px">Sin contactos aún</p>'; return; }
      filtered.forEach(function(c) {
        var card = document.createElement('div');
        card.style.cssText = 'border:1px solid #e5e7eb;border-radius:8px;padding:16px;margin-bottom:12px;background:#fff;';
        var statusColors = {'nuevo':'#3b82f6','contactado':'#f59e0b','en proceso':'#8b5cf6','cliente':'#10b981','recontacto':'#ec4899','descartado':'#9ca3af'};
        var sc = statusColors[c.status]||'#9ca3af';
        card.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:start;gap:12px">'+
          '<div style="flex:1"><div style="font-weight:700;font-size:15px;margin-bottom:2px">'+(c.name||'Sin nombre')+'</div>'+
          '<div style="font-size:12px;color:#888">'+(c.email||'')+' '+(c.company?'· '+c.company:'')+'</div>'+
          (c.message?'<div style="margin-top:8px;font-size:13px;color:#555;padding:8px;background:#f9fafb;border-radius:6px">'+c.message+'</div>':'')+
          '<div style="font-size:11px;color:#aaa;margin-top:6px">'+c.created_at+'</div></div>'+
          '<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">'+
          '<span style="font-size:10px;font-weight:600;padding:3px 10px;border-radius:100px;color:#fff;background:'+sc+'">'+(c.status||'nuevo')+'</span>'+
          '<select data-id="'+c.id+'" class="status-change" style="font-size:11px;padding:4px 8px;border:1px solid #ccc;border-radius:6px;font-family:Montserrat,sans-serif">'+
          '<option value="nuevo"'+(c.status==='nuevo'?' selected':'')+'>Nuevo</option>'+
          '<option value="contactado"'+(c.status==='contactado'?' selected':'')+'>Contactado</option>'+
          '<option value="en proceso"'+(c.status==='en proceso'?' selected':'')+'>En proceso</option>'+
          '<option value="cliente"'+(c.status==='cliente'?' selected':'')+'>Cliente</option>'+
          '<option value="descartado"'+(c.status==='descartado'?' selected':'')+'>Descartado</option>'+
          '</select></div></div>';
        listDiv.appendChild(card);
      });
      // Bind status changes
      listDiv.querySelectorAll('.status-change').forEach(function(sel){
        sel.addEventListener('change', function(e){
          var id = e.target.dataset.id;
          var newStatus = e.target.value;
          fetch('api/webhook.php?token=' + encodeURIComponent(secret), {
            method: 'PATCH',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({id:id, status:newStatus})
          }).then(function(r){return r.json()}).then(function(res){
            if(res.ok) { showToast('Estado actualizado'); renderContacts(); }
            else showToast('Error al actualizar', true);
          }).catch(function(){ showToast('Error de conexión', true); });
        });
      });
    }
    renderList('');
    statusFilter.addEventListener('change', function(e){ renderList(e.target.value); });
  }).catch(function(){ listDiv.innerHTML = '<p style="color:#dc2626">Error cargando contactos</p>'; });
  return f;
}

initAuth();
