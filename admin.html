<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css">
  <script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>
  <title>CMS Admin — Germán Velásquez</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* CSS omitted for brevity, same styles as above */
  </style>
</head>
<body>

<!-- AUTH MODAL -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2>CMS Admin</h2>
    <p>Ingresa la contraseña para acceder al panel de edición.</p>
    <input type="password" id="authPassword" placeholder="Contraseña" autofocus>
    <div class="error-msg" id="authError">Contraseña incorrecta.</div>
    <button onclick="submitAuth()">Acceder</button>
  </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>Germán Velásquez</h1>
    <span>CMS Admin</span>
  </div>
  <nav class="sidebar-nav" id="sidebarNav">
    <button data-section="about"><span class="nav-icon">👤</span>About</button>
    <button data-section="labs"><span class="nav-icon">🔬</span>Labs</button>
    <button class="active" data-section="hero"><span class="nav-icon">🏠</span>Hero</button>
    <button data-section="how"><span class="nav-icon">⚙️</span>Cómo trabajo</button>
    <button data-section="why"><span class="nav-icon">⭐</span>Por qué yo</button>
    <button data-section="build"><span class="nav-icon">🛠️</span>Servicios</button>
    <button data-section="projects"><span class="nav-icon">🚀</span>Proyectos</button>
    <button data-section="blog"><span class="nav-icon">📝</span>Blog Posts</button>
    <button data-section="nav"><span class="nav-icon">☰</span>Menú</button>
    <button data-section="config"><span class="nav-icon">⚙️</span>Config</button>
    <button data-section="contacts"><span class="nav-icon">👥</span>Contactos <span id="contact-count" style="background:#FF6B2C;color:#fff;font-size:10px;padding:2px 6px;border-radius:100px;margin-left:4px">0</span></button>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-preview" onclick="openPreview()"><span class="icon">👁️</span>Vista previa</button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <h2 id="sectionTitle">About</h2>
    <div style="display:flex;align-items:center;">
      <span class="save-status" id="saveStatus"></span>
      <button class="btn-save" id="btnSave" onclick="saveContent()">💾 Guardar cambios</button>
    </div>
  </div>
  <div class="content-area">
    <!-- Sección About -->
    <div class="section active" id="about-section">
      <h3>Contenido About</h3>
      <div class="field-row">
        <label>Título</label>
        <input type="text" id="about-title" placeholder="Título de la sección" />
      </div>
      <div class="field-row">
        <label>Descripción</label>
        <textarea id="about-description" placeholder="Descripción de la sección">Aquí escribes qué deseas editar.</textarea>
      </div>
      <div class="field-row">
        <label>Contenido</label>
        <textarea id="about-content" placeholder="Contenido sobre mí">Escribe el contenido que quieras aquí.</textarea>
      </div>
      <button class="btn-save" onclick="saveAboutContent()">💾 Guardar About</button>
    </div>

    <!-- Sección Labs -->
    <div class="section" id="labs-section">
      <h3>Contenido Labs</h3>
      <div class="field-row">
        <label>Título</label>
        <input type="text" id="labs-title" placeholder="Título de la sección" />
      </div>
      <div class="field-row">
        <label>Descripción</label>
        <textarea id="labs-description" placeholder="Descripción de la sección">Aquí la descripción de Labs.</textarea>
      </div>
      <div class="field-row">
        <label>Contenido Labs</label>
        <textarea id="labs-content" placeholder="Ideas, repositorios...">Escribe aquí el contenido que desees.</textarea>
      </div>
      <button class="btn-save" onclick="saveLabsContent()">💾 Guardar Labs</button>
    </div>

  </div>
</div>
<script>
  function saveAboutContent() {
    // Implement logic to save about content
  }
  function saveLabsContent() {
    // Implement logic to save labs content
  }
</script>
</body>
</html>
